name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    # Only run in the canonical repo, not forks
    if: ${{ github.repository == 'leonletto/thrum' }}
    # macOS runner required for Apple codesigning and notarization
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Set up Node.js (for UI build)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Import Apple Developer Certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create a temporary keychain for CI
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Decode and import the .p12 certificate
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          rm "$RUNNER_TEMP/certificate.p12"

          # Allow codesign to access the keychain without prompting
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add temporary keychain to the search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Verify the identity is available
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Notarize macOS binaries
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          # Find and notarize each signed darwin binary (with retries)
          for bin in dist/thrum_darwin_*/thrum; do
            echo "Notarizing $bin..."

            zip_path="${bin}.zip"
            ditto -c -k "$bin" "$zip_path"

            # Retry up to 3 times with 15s backoff for transient network errors
            for attempt in 1 2 3; do
              echo "  Attempt $attempt/3..."
              if xcrun notarytool submit "$zip_path" \
                --apple-id "$APPLE_ID" \
                --team-id "$APPLE_TEAM_ID" \
                --password "$APPLE_APP_SPECIFIC_PASSWORD" \
                --wait; then
                echo "Notarization complete for $bin"
                break
              fi
              if [ "$attempt" -lt 3 ]; then
                echo "  Retrying in $((attempt * 15))s..."
                sleep $((attempt * 15))
              else
                echo "  Notarization failed after 3 attempts for $bin"
                exit 1
              fi
            done

            rm "$zip_path"
          done

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi

  publish-opencode-plugin:
    if: ${{ github.repository == 'leonletto/thrum' }}
    runs-on: ubuntu-latest
    needs: [release]
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      # thrum-ygf2: skip publish when the local package version is already
      # published. Without this gate, every thrum tag where opencode-plugin's
      # version hasn't been bumped failed with HTTP 403 ("You cannot publish
      # over the previously published versions"). The main `release` job
      # (binaries + Homebrew) succeeds regardless, but the red X on the run
      # summary was misleading. Now: skip cleanly if version unchanged,
      # publish if bumped, fail only on real publish errors. local_version
      # is sourced from the in-repo package.json (no untrusted input).
      - name: Check whether opencode-plugin version is new
        id: version-check
        working-directory: opencode-plugin
        run: |
          local_version=$(node -p "require('./package.json').version")
          if npm view "opencode-thrum@${local_version}" version --silent 2>/dev/null | grep -q "^${local_version}$"; then
            echo "Already published: opencode-thrum@${local_version}"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Will publish: opencode-thrum@${local_version}"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and publish opencode-thrum
        if: steps.version-check.outputs.should_publish == 'true'
        working-directory: opencode-plugin
        # npm OIDC trusted publishing requires npm >= 11.5.1; Node 22 ships
        # npm 10.x, which carries the id-token permission but never performs
        # the OIDC token exchange (publish goes out unauthenticated → E404).
        # Pin a floor at 11.5.1 to enable the handshake.
        run: npm install -g npm@^11.5.1 && npm ci && npm run build && npm publish
