interface:
  display_name: "Project Philosophy"
  short_description: "Use when a project needs its implementation philosophy established or updated — the canonical doc at .thrum/philosophy.md defining anti-patterns, red flags, and project-specific rules that implementation agents read at task-start time. First invocation generates from project inspection; subsequent invocations reconcile against current project state and propose diffs."
  default_prompt: "Use when philosophical/architectural decisions need framing."
