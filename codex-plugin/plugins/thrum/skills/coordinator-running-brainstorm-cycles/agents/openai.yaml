interface:
  display_name: "Coordinator: Brainstorm Cycles"
  short_description: "Use when starting a brainstorm for a bug fix, feature, or architectural decision the coordinator can't trivially decide alone — spawns a researcher in an isolated worktree, runs the brainstorm interactively with the user, iterates dual-review cycles to ready-to-merge, optionally drives an overarching coherence pass when multiple sibling brainstorms close, then hands off to project-setup. Saves coordinator context by isolating brainstorm work in a sub-agent worktree rather than burning main-context tokens on Q-by-Q dialog."
  default_prompt: "Use when starting a brainstorm for a bug fix, feature, or architectural decision the coordinator can't trivially decide alone."
